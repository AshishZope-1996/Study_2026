<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- GOOGLE SIGNUP API -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

</head>

<body>

    <div class="container">

        <h2>Signup</h2>

        <input type="text" id="name" placeholder="Enter Name">

        <input type="email" id="email" placeholder="Enter Email">

        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="signup()">
            Signup
        </button>

        <br><br>

        <!-- GOOGLE SIGNUP -->

        <div id="g_id_onload" data-client_id="220354237347-5oa25ooc08sqslibppont80nsupglvie.apps.googleusercontent.com"
            data-callback="handleGoogleSignup">
        </div>

        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signup_with"
            data-shape="rectangular" data-logo_alignment="left">
        </div>

        <p>
            Already have account?
            <a href="index.html">
                Login
            </a>
        </p>

    </div>

    <script src="js/signup.js"></script>
    <script src="js/google-signup.js"></script>

</body>

</html>
