<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Portal Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container dashboard-container">

    <header class="dashboard-header">
        <div class="brand-block">
            <div class="brand-logo">SP</div>
            <div>
                <h2>Study Portal</h2>
                <p class="subtitle">Your study hub for courses, profile, and postal data.</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="mobile-menu-button" onclick="toggleMenu()" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <button class="logout-button" onclick="logout()">Logout</button>
        </div>
    </header>

    <nav class="page-nav">
        <a class="nav-link active" href="dashboard.html">Home</a>
        <a class="nav-link" href="profile.html">Profile</a>
        <a class="nav-link" href="postal.html">Postal</a>
    </nav>

    <section class="card dashboard-welcome">
        <h3 id="welcome"></h3>
        <p id="userEmail"></p>
    </section>

    <section class="menu-grid">
        <a class="menu-card" href="profile.html">
            <h4>Profile</h4>
            <p>View your study profile, account type, and saved details.</p>
        </a>
        <a class="menu-card" href="postal.html">
            <h4>Postal Address</h4>
            <p>Manage your address for certificate delivery and contact.</p>
        </a>
    </section>

</div>

<script src="js/menu.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
