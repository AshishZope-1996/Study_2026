<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container dashboard-container">

    <header class="dashboard-header">
        <h2>My Profile</h2>
        <button class="logout-button" onclick="logout()">Logout</button>
    </header>

    <div class="dashboard-grid">

        <section class="card profile-card">
            <div class="profile-top">
                <div class="profile-avatar">
                    <img id="profileImage" src="https://via.placeholder.com/120?text=?" alt="Profile Image">
                </div>
                <div class="profile-summary">
                    <h3 id="welcome"></h3>
                    <p id="userEmail"></p>
                    <p id="userType"></p>
                </div>
            </div>
            <div class="profile-meta">
                <p><strong>User ID:</strong> <span id="userId"></span></p>
                <p><strong>Account Type:</strong> <span id="userLoginType"></span></p>
            </div>
        </section>

        <section class="card postal-card">
            <h3>Postal Address</h3>
            <form id="postalForm" onsubmit="savePostal(event)">
                <label for="addressLine">Address</label>
                <input type="text" id="addressLine" placeholder="Street address" />
                <label for="city">City</label>
                <input type="text" id="city" placeholder="City" />
                <label for="state">State / Region</label>
                <input type="text" id="state" placeholder="State or region" />
                <label for="postalCode">Postal Code</label>
                <input type="text" id="postalCode" placeholder="Postal code" />
                <label for="country">Country</label>
                <input type="text" id="country" placeholder="Country" />

                <button type="submit" class="save-button">Save Address</button>
            </form>

            <div class="address-summary">
                <h4>Saved Address</h4>
                <p id="savedAddress">No postal details saved yet.</p>
            </div>
        </section>

    </div>
</div>

<script src="js/dashboard.js"></script>

</body>
</html>
