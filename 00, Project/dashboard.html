<!DOCTYPE html>
<html lang="en">

    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container dashboard-container">

    <nav class="page-nav">
        <a class="nav-link active" href="dashboard.html">Home</a>
        <a class="nav-link" href="profile.html">Profile</a>
        <a class="nav-link" href="postal.html">Postal</a>
    </nav>

    <section class="card dashboard-welcome">
        <h3 id="welcome"></h3>
        <p id="userEmail"></p>
    </section>

    <section class="menu-grid">
        <a class="menu-card" href="profile.html">
            <h4>Profile</h4>
            <p>View your account details and profile photo.</p>
        </a>
        <a class="menu-card" href="postal.html">
            <h4>Postal Address</h4>
