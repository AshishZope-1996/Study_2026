<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- GOOGLE API -->

    <script src="https://accounts.google.com/gsi/client"
            async defer>
    </script>

</head>

<body>

<div class="container">

    <h2>Login</h2>

    <input type="email"
           id="email"
           placeholder="Enter Email">

    <input type="password"
           id="password"
           placeholder="Enter Password">

    <button onclick="login()">
        Login
    </button>

    <br><br>

    <!-- GOOGLE SIGNIN -->

    <div id="g_id_onload"
         data-client_id="220354237347-5oa25ooc08sqslibppont80nsupglvie.apps.googleusercontent.com"
         data-callback="handleGoogleSignin">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="signin_with"
         data-shape="rectangular"
         data-logo_alignment="left">
    </div>

    <p>

        <a href="forgot-password.html">
            Forgot Password?
        </a>

    </p>

    <p>

        Don't have account?

        <a href="signup.html">
            Signup
        </a>

    </p>

</div>

<script src="js/login.js"></script>

</body>

</html>
