<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<div class="loader-overlay" id="globalLoader">
    <div class="loader"></div>
    <p>Recovering account...</p>
</div>

<div class="auth-grid">

    <section class="auth-panel">
        <div class="hero-badge">Study Portal</div>
        <h1>Forgot your password?</h1>
        <p>Enter the email linked to your account and we’ll help you recover access quickly.</p>
    </section>

    <section class="auth-card">
        <div class="auth-card-header">
            <h2>Reset Password</h2>
            <p>Update your password and sign back in.</p>
        </div>

        <div class="form-content">
            <input type="email" id="email" placeholder="Registered email address">
            <button class="primary-button" onclick="resetPassword()">Reset Password</button>
            <div class="auth-links">
                <a href="index.html">Back to Login</a>
            </div>
        </div>
    </section>

</div>

<script src="js/data-store.js"></script>
<script src="js/ui.js"></script>
<script src="js/forgot.js"></script>
</body>
</html>
