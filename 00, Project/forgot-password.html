<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<div class="auth-grid">

    <section class="auth-panel">
        <div class="hero-badge">Study Portal</div>
        <h1>Forgot your password?</h1>
        <p>Enter the email linked to your account and we’ll help you recover access quickly.</p>
    </section>

    <section class="auth-card">
        <div class="auth-card-header">
            <h2>Reset Password</h2>
            <p>Login again after resetting your password.</p>
        </div>

        <div class="form-content">
            <input type="email" id="email" placeholder="Registered email address">
            <button class="primary-button" onclick="resetPassword()">Reset Password</button>
            <div class="auth-links">
                <a href="index.html">Back to Login</a>
            </div>
        </div>
    </section>

</div>

<script src="js/forgot.js"></script>

</body>
</html>
